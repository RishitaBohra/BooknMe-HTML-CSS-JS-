<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Community | BooknMe 2024</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="container community-page">
    <h2 class="section-title">Community Posts</h2>

    <input type="text" id="search-input" placeholder="Search posts..." />

    <div id="community-list" class="community-list">

    </div>
  </main>

  <div id="footer"></div>

  <script src="script.js"></script>
  <script>
    const communityList = document.getElementById('community-list');
    const searchInput = document.getElementById('search-input');

 
    const communityPosts = JSON.parse(localStorage.getItem('myPosts')) || [];

    function displayPosts(posts){
      communityList.innerHTML = '';

      if(posts.length === 0){
        communityList.innerHTML = `<p>No posts found.</p>`;
      } else {
        posts.forEach(post => {
          const postCard = document.createElement('div');
          postCard.className = 'post-card';
          postCard.innerHTML = `
            <h3>${post.title}</h3>
            <p><strong>By:</strong> ${post.username || 'Anonymous'} | <strong>Category:</strong> ${post.category}</p>
            <p>${post.content}</p>
            <button class="like-btn">❤️ Like</button>
          `;
          communityList.appendChild(postCard);
        });


        document.querySelectorAll('.like-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            btn.textContent = '❤️ Liked!';
            btn.disabled = true;
          });
        });
      }
    }


    displayPosts(communityPosts);


    searchInput.addEventListener('input', function(){
      const keyword = this.value.toLowerCase();
      const filtered = communityPosts.filter(post =>
        post.title.toLowerCase().includes(keyword) ||
        post.content.toLowerCase().includes(keyword) ||
        post.category.toLowerCase().includes(keyword)
      );
      displayPosts(filtered);
    });
  </script>

</body>
</html>
