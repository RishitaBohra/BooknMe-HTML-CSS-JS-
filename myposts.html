<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Posts | BooknMe 2024</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="navbar"></div>

    <main class="container myposts-page">
      <h2 class="section-title">My Posts</h2>

      <div id="posts-list" class="posts-list"></div>
    </main>

    <script src="script.js"></script>
    <script>
      const postsList = document.getElementById("posts-list");
      const username = localStorage.getItem("loggedInUser");

      if (!username) {
        postsList.innerHTML = `<p>Please <a href="login.html">login</a> to view your posts.</p>`;
      } else {
        const allPosts = JSON.parse(localStorage.getItem("myPosts")) || [];

        // Filter posts by logged-in user
        const userPosts = allPosts.filter((post) => post.username === username);

        if (userPosts.length === 0) {
          postsList.innerHTML = `<p>You haven’t posted anything yet. Start rewriting your favorite stories!</p>`;
        } else {
          userPosts.forEach((post) => {
            const postCard = document.createElement("div");
            postCard.className = "post-card";
            postCard.innerHTML = `
          <h3>${post.title}</h3>
          <p><strong>Category:</strong> ${post.category}</p>
          <p>${post.content}</p>
        `;
            postsList.appendChild(postCard);
          });
        }
      }
    </script>
  </body>
</html>
