<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Merchandise | BooknMe 2024</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="container merchandise-page">
    <h2 class="section-title">BooknMe Merchandise</h2>
    <p class="merch-intro">Explore exclusive merchandise inspired by your favourite books and community posts!</p>

    <div class="merch-grid">
      <div class="merch-card">
        <img src="images/merch1.png" alt="Book Quote Mug" />
        <h3>Book Quote Mug</h3>
        <p class="price">₹299</p>
        <button class="merch-btn">View Details</button>
      </div>

      <div class="merch-card">
        <img src="images/merch2.jpeg" alt="Reading Lover Tote Bag" />
        <h3>Reading Lover Tote Bag</h3>
        <p class="price">₹499</p>
        <button class="merch-btn">View Details</button>
      </div>

      <div class="merch-card">
        <img src="images/merch3.jpeg" alt="BooknMe Custom Notebook" />
        <h3>Custom Notebook</h3>
        <p class="price">₹399</p>
        <button class="merch-btn">View Details</button>
      </div>

      <div class="merch-card">
        <img src="images/merch4.jpeg" alt="Inspirational Bookmark Set" />
        <h3>Bookmark Set</h3>
        <p class="price">₹199</p>
        <button class="merch-btn">View Details</button>
      </div>
    </div>

  </main>


  <script src="script.js"></script>

</body>
</html>
