<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post | BooknMe</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="navbar"></div>

  <main class="container post-page">
    <h2 id="post-category-title" class="section-title">Create a Post</h2>

    <form id="post-form" class="post-form">
      <input type="text" id="post-title" placeholder="Enter your post title" required />
      <textarea id="post-content" placeholder="Write your story, ending, or plot here..." required></textarea>
      <button type="submit" class="post-btn">Submit</button>
    </form>
  </main>

  <script src="script.js"></script>
  <script>

    const params = new URLSearchParams(window.location.search);
    const category = params.get('category');
    document.getElementById('post-category-title').textContent = `Create a Post in ${category}`;


    document.getElementById('post-form').addEventListener('submit', function(e){
      e.preventDefault();
      
      const title = document.getElementById('post-title').value.trim();
      const content = document.getElementById('post-content').value.trim();
      const username = localStorage.getItem('loggedInUser') || 'Anonymous'; 
      const date = new Date().toLocaleString();
      const id = Date.now(); 

      if(title && content){
        const newPost = { id, title, content, category, username, date };

        let myPosts = JSON.parse(localStorage.getItem('myPosts')) || [];
        myPosts.push(newPost);
        localStorage.setItem('myPosts', JSON.stringify(myPosts));

        alert('Post submitted successfully!');
        window.location.href = 'myposts.html';
      } else {
        alert('Please fill all fields.');
      }
    });
  </script>

</body>
</html>
